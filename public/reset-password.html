<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - LLM Proxy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reset-container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 450px;
        }

        h1 {
            color: #667eea;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #667eea;
            color: white;
        }

        .btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #6c757d;
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .error {
            background: #fee;
            border: 1px solid #fcc;
            color: #c00;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .success {
            background: #efe;
            border: 1px solid #cfc;
            color: #060;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .info-box {
            background: #e7f3ff;
            border: 1px solid #b3d9ff;
            color: #004085;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .username-display {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
            color: #667eea;
        }

        .password-requirements {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .success-icon {
            text-align: center;
            font-size: 48px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <h1>🔐 Reset Password</h1>
        <p class="subtitle">LLM Proxy Manager</p>

        <div id="loading" style="text-align: center; padding: 40px;">
            <div class="loading" style="display: inline-block; width: 40px; height: 40px;"></div>
            <p style="margin-top: 15px; color: #666;">Verifying reset link...</p>
        </div>

        <div id="error" class="error" style="display: none;"></div>
        <div id="success" class="success" style="display: none;"></div>

        <div id="resetForm" style="display: none;">
            <div class="info-box">
                Resetting password for user:
            </div>
            <div class="username-display" id="usernameDisplay"></div>

            <form id="passwordResetForm">
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" name="newPassword" required minlength="6">
                    <p class="password-requirements">Minimum 6 characters</p>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required minlength="6">
                </div>

                <button type="submit" class="btn" id="resetBtn">
                    Reset Password
                </button>

                <a href="login.html">
                    <button type="button" class="btn btn-secondary">
                        Back to Login
                    </button>
                </a>
            </form>
        </div>

        <div id="successView" style="display: none; text-align: center;">
            <div class="success-icon">✅</div>
            <h2 style="color: #667eea; margin-bottom: 15px;">Password Reset Successful!</h2>
            <p style="color: #666; margin-bottom: 25px;">Your password has been updated. You can now log in with your new password.</p>
            <a href="login.html">
                <button type="button" class="btn">
                    Go to Login
                </button>
            </a>
        </div>
    </div>

    <script>
        let resetToken = null;

        // Get token from URL
        function getTokenFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('token');
        }

        // Verify token on page load
        async function verifyToken() {
            resetToken = getTokenFromUrl();

            if (!resetToken) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').textContent = 'No reset token provided. Please use the link from your email.';
                document.getElementById('error').style.display = 'block';
                return;
            }

            try {
                const response = await fetch(`./api/auth/verify-reset-token/${resetToken}`);
                const data = await response.json();

                document.getElementById('loading').style.display = 'none';

                if (data.valid) {
                    document.getElementById('usernameDisplay').textContent = data.username;
                    document.getElementById('resetForm').style.display = 'block';
                    document.getElementById('newPassword').focus();
                } else {
                    document.getElementById('error').textContent = data.error || 'Invalid or expired reset link.';
                    document.getElementById('error').style.display = 'block';

                    // Add back to login button
                    const backBtn = document.createElement('a');
                    backBtn.href = 'login.html';
                    backBtn.innerHTML = '<button type="button" class="btn btn-secondary">Back to Login</button>';
                    document.getElementById('error').parentNode.appendChild(backBtn);
                }
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').textContent = 'Network error. Please try again later.';
                document.getElementById('error').style.display = 'block';
            }
        }

        // Handle password reset form submission
        document.getElementById('passwordResetForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('resetBtn');
            const errorDiv = document.getElementById('error');
            const successDiv = document.getElementById('success');

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            // Validate passwords match
            if (newPassword !== confirmPassword) {
                errorDiv.textContent = 'Passwords do not match. Please try again.';
                errorDiv.style.display = 'block';
                return;
            }

            // Validate password length
            if (newPassword.length < 6) {
                errorDiv.textContent = 'Password must be at least 6 characters long.';
                errorDiv.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> Resetting Password...';

            try {
                const response = await fetch('./api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: resetToken, newPassword })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Show success view
                    document.getElementById('resetForm').style.display = 'none';
                    document.getElementById('successView').style.display = 'block';
                } else {
                    errorDiv.textContent = data.error || 'Failed to reset password. Please try again.';
                    errorDiv.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Reset Password';
                }
            } catch (error) {
                errorDiv.textContent = 'Network error. Please try again.';
                errorDiv.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            }
        });

        // Verify token when page loads
        verifyToken();
    </script>
</body>
</html>
