worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # ── Global proxy timeouts (LLM responses can be slow) ────────────────────
    proxy_connect_timeout  30s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;

    # ── Disable buffering globally for SSE / streaming ───────────────────────
    proxy_buffering         off;
    proxy_request_buffering off;
    proxy_cache             off;

    # ── Common proxy headers (reused via include-style vars) ─────────────────
    # Applied per-location below

    server {
        listen 80;
        server_name _;

        ########################################################################
        # LLM Proxy Manager  →  https://www.voipguru.org/llmProxy/
        ########################################################################
        location /llmProxy/ {
            proxy_pass         http://llm-proxy-manager:3000/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        ########################################################################
        # DevinGPT chat app  →  https://www.voipguru.org/devinGPT/
        ########################################################################
        location /devinGPT/ {
            proxy_pass         http://devingpt:8055/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        ########################################################################
        # Audio Transcriber  →  https://www.voipguru.org/transcribe/
        ########################################################################
        location /transcribe/ {
            proxy_pass         http://transcriber:8092/transcribe/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        ########################################################################
        # Health check (nginx itself)
        ########################################################################
        location /health {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
