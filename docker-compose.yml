version: '3.8'

services:
  llm-proxy:
    image: dblagbro/llm-proxy-manager:1.0.2
    container_name: llm-proxy
    restart: unless-stopped
    ports:
      - "3100:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - ./config:/app/config
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - llm-proxy-network

networks:
  llm-proxy-network:
    driver: bridge
