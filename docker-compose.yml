services:
  llm-proxy2:
    container_name: llm-proxy2
    image: llm-proxy2:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:////app/data/llmproxy.db}
      - REDIS_URL=${REDIS_URL:-}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - CLUSTER_NODE_ID=${CLUSTER_NODE_ID:-}
      - CLUSTER_NODE_URL=${CLUSTER_NODE_URL:-}
      - CLUSTER_PEERS=${CLUSTER_PEERS:-}
      - CLUSTER_SYNC_SECRET=${CLUSTER_SYNC_SECRET:-}
    volumes:
      - llm-proxy2-data:/app/data
      - llm-proxy2-logs:/app/logs
    networks:
      - llm-proxy2-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  llm-proxy2-data:
  llm-proxy2-logs:

networks:
  llm-proxy2-net:
    driver: bridge
